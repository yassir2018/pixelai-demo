<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelAI — Log In</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../assets/custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Theme toggle floating button -->
<button onclick="toggleTheme()" style="position:fixed;top:16px;inset-inline-end:16px;z-index:999;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
  <i id="themeIcon" class="fas fa-sun"></i>
</button>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <a href="/pages/index.html" class="auth-logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">PixelAI</span>
    </a>

    <h1 class="auth-title" data-i18n="login_title">Welcome Back</h1>
    <p class="auth-subtitle" data-i18n="login_subtitle">Sign in to continue</p>

    <!-- Google OAuth button -->
    <button class="google-btn" id="googleAuthBtn">
      <span class="google-icon"></span>
      Continue with Google
    </button>

    <!-- Divider -->
    <div class="auth-divider">
      <span>or sign in with email</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" data-i18n="login_email">Email Address</label>
        <input
          type="email"
          id="loginEmail"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          <span data-i18n="login_password">Password</span>
          <a href="#" style="color:var(--accent);font-weight:600;font-size:12px;">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input
            type="password"
            id="loginPassword"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" onclick="togglePass('loginPassword',this)" style="position:absolute;inset-inline-end:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="loginBtn" class="btn-yellow btn-submit" data-i18n="login_btn">Sign In</button>
    </form>

    <p class="auth-switch">
      <span data-i18n="login_no_account">Don't have an account?</span>
      <a href="/pages/register.html" data-i18n="login_register"> Create Account</a>
    </p>

  </div>
</div>

<script src="../js/translations.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/auth.js"></script>
<script>
  initTheme();
  setLanguage(localStorage.getItem('pixelai_lang') || 'ar');

  // Language switcher minimal
  const lsDiv = document.createElement('div');
  lsDiv.style.cssText = 'position:fixed;top:16px;inset-inline-start:16px;z-index:999;display:flex;gap:6px;';
  ['ar','en','fr'].forEach(lang => {
    const btn = document.createElement('button');
    btn.textContent = lang === 'ar' ? 'عربي' : lang.toUpperCase();
    btn.style.cssText = 'padding:6px 10px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;';
    btn.onclick = () => setLanguage(lang);
    lsDiv.appendChild(btn);
  });
  document.body.appendChild(lsDiv);

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<i class="fas fa-eye"></i>';
    }
  }
</script>
</body>
</html>
