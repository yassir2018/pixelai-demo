server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index pages/index.html;

    location = / {
        return 301 /pages/index.html;
    }

    location / {
        try_files $uri $uri/ /pages/404.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
